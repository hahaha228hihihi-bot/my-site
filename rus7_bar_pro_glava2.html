<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 2. Историческая фонетика — Русский язык 7 класс</title>
    <style>
        /* Стили идентичны */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #1f618d; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 2. Историческая фонетика</h1>
        <div class="page-title">ПАДЕНИЕ РЕДУЦИРОВАННЫХ И ЧЕРЕДОВАНИЯ (УГЛУБЛЁННЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { id: "1", title: "Сущность редуцированных гласных Ъ и Ь в древнерусском языке", text: "В древнерусской фонетической системе буквы <strong>Ъ (ер)</strong> и <strong>Ь (ерь)</strong> обозначали самостоятельные сверхкраткие гласные звуки. Ъ был сверхкратким вариантом звука [о], а Ь — сверхкратким вариантом [э]. Слова не могли оканчиваться на согласный звук, поэтому на конце всегда писались редуцированные.", ex: "Пример: Древние слова <i>домъ, коньць, сънъ</i> произносились с короткими гласными на конце." },
            { id: "2", title: "Великое падение редуцированных и его сильная/слабая позиции", text: "В XII-XIII веках редуцированные исчезли. В <strong>сильной позиции</strong> (под ударением или в слоге перед слабым редуцированным) Ъ перешёл в полноценный звук [о], а Ь — в [е]. В <strong>слабой позиции</strong> (на конце слова или перед сильным редуцированным) они полностью исчезли, оставив после себя согласные.", ex: "Схема: Древнерусское <i>сънъ</i> -> первый Ъ в сильной позиции (стал О), второй на конце в слабой (исчез) -> получилось современное 'сон'." },
            { id: "3", title: "Появление феномена беглых гласных", text: "Исчезновение редуцированных гласных в слабых позициях привело к тому, что при изменении формы слова гласные О и Е стали пропадать. Так в русском языке сформировались <strong>беглые гласные</strong>, которые до сих пор доставляют трудности при разборе слов по составу.", ex: "Пример: И.п. <i>сънъ</i> -> сон. Р.п. <i>съна</i> -> первый Ъ оказался в слабой позиции и исчез -> получилось 'сна' (гласная О сбежала)." },
            { id: "4", title: "Первая палатализация согласных и современные корни", text: "<strong>Палатализация</strong> — это историческое смягчение согласных звуков под влиянием последующих гласных переднего ряда. Согласно закону первой палатализации, праславянские заднеязычные согласные <strong>К, Г, Х</strong> перед гласными Е, И перешли в шипящие <strong>Ч, Ж, Ш</strong>.", ex: "Чередование: друг — дружить (г/ж), лик — личико (к/ч), дух — душенька (х/ш). Это закон исторической фонетики." },
            { id: "5", title: "История звука [Ц] и вторая палатализация", text: "Вторая палатализация происходила позже и превратила те же согласные <strong>К, Г, Х</strong> в мягкие свистящие <strong>Ц, З, С</strong> перед гласными 'ять' [ѣ] и [и]. Именно поэтому в древних текстах и некоторых чередованиях мы видим звук Ц на месте К.", ex: "Пример: Рука — руце (в древнерусском Дательном падеже), лик — лицо, крик — кричать — восклицать (к/ч/ц)." }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
