<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 4. Причастие — Русский язык 7 класс</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #fcf9f5; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #27ae60; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d5f5e3; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2ecc71; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        
        .topic-card { background: #fffcf9; border: 1px solid #d5f5e3; border-left: 6px solid #2cc36b; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        
        .btn-toggle { background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #218c53; }
        
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d5f5e3; line-height: 1.6; color: #444; }
        .example { background: #e8f8f5; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #27ae60; color: #218c4e; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 4. Причастие</h1>
        <div class="page-title">ПОЛНЫЙ КУРС, СУФФИКСЫ И ОРФОГРАММЫ (БАЗОВЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { 
                id: "1", 
                title: "Понятие о причастии. Признаки глагола и прилагательного", 
                text: "<strong>Причастие</strong> — особая форма глагола, обозначающая признак предмета по действию. Изменяется по родам, числам и падежам (как прилагательное), но сохраняет вид, время и возвратность (как глагол).", 
                ex: "Пример: Читающий мальчик (наст. вр., несов. вид, муж. род, ед. ч., И.п.)." 
            },
            { 
                id: "2", 
                title: "Причастный оборот. Знаки препинания при нём", 
                text: "Причастие с зависимыми словами образует <strong>причастный оборот</strong>. Обособляется (выделяется запятыми) только тогда, когда стоит <strong>ПОСЛЕ определяемого слова</strong>.", 
                ex: "После слова: Книга, <u>написанная автором</u>, была сдана. / Перед словом: <u>Написанная автором</u> книга была сдана." 
            },
            { 
                id: "3", 
                title: "Действительные причастия настоящего времени", 
                text: "Обозначают признак предмета, который сам совершает действие. Написание суффикса зависит от спряжения глагола: <br>• I спряжение: суффиксы <strong>-УЩ- / -ЮЩ-</strong>. <br>• II спряжение: суффиксы <strong>-АЩ- / -ЯЩ-</strong>.", 
                ex: "Пример: Писать (I) -> пиш<strong>ущ</strong>ий. Строить (II) -> стро́<strong>ящ</strong>ий." 
            },
            { 
                id: "4", 
                title: "Действительные причастия прошедшего времени", 
                text: "Образуются от основы инфинитива с помощью суффиксов <strong>-ВШ-</strong> (после гласных) и <strong>-Ш-</strong> (после согласных). Гласная перед суффиксом полностью сохраняется из инфинитива.", 
                ex: "Пример: Увид<u>е</u>ть -> увид<strong>е</strong>вший, раста́<u>я</u>ть -> раста́<strong>я</strong>вший." 
            },
            { 
                id: "5", 
                title: "Страдательные причастия настоящего времени", 
                text: "Обозначают признак предмета, над которым совершают действие. Суффиксы зависят от спряжения: <br>• I спряжение: суффиксы <strong>-ЕМ- / -ОМ-</strong>. <br>• II спряжение: суффикс <strong>-ИМ-</strong>.", 
                ex: "Пример: Читать (I) -> чита́<strong>ем</strong>ый. Любить (II) -> люб<strong>им</strong>ый." 
            },
            { 
                id: "6", 
                title: "Страдательные причастия прошедшего времени. Суффикс -ЕНН-", 
                text: "Образуются с помощью суффиксов <strong>-НН-, -ЕНН-, -Т-</strong>. Если глагол оканчивался на -ИТЬ или -ЕТЬ, пишется строго суффикс <strong>-ЕНН-</strong>, а гласная инфинитива отсекается.", 
                ex: "Пример: Задерж<u>а</u>ть -> задерж<strong>а</strong>нный. Постро<u>ить</u> -> постро<strong>енн</strong>ый." 
            },
            { 
                id: "7", 
                title: "Краткие страдательные причастия. Правило одной буквы Н", 
                text: "Страдательные причастия имеют краткую форму, которая в предложении всегда является <strong>сказуемым</strong>. В кратких страдательных причастиях пишется строго <strong>одна буква Н</strong>.", 
                ex: "Пример: Задача реше<strong>н</strong>а, дом построи<strong>н</strong>, уроки сдела<strong>н</strong>ы." 
            },
            { 
                id: "8", 
                title: "Правописание Н и НН в полных причастиях", 
                text: "В полных причастиях пишется <strong>НН</strong>, если соблюдается хотя бы одно условие: есть приставка (кроме НЕ-), есть зависимые слова, слово образовано от глагола совершенного вида, или оканчивается на -ованный/-ёванный.", 
                ex: "Пример: <strong>по</strong>жаренное мясо (приставка), жаренное <u>на костре</u> мясо (зависимое слово), решённая задача (сов. вид)." 
            },
            { 
                id: "9", 
                title: "Слитно и раздельно НЕ с причастиями", 
                text: "<strong>НЕ пишется РАЗДЕЛЬНО:</strong> с краткими причастиями, при наличии зависимых слов или противопоставления с союзом А. В остальных случаях полные причастия пишутся с НЕ <strong>слитно</strong>.", 
                ex: "Пример: Работа не_сделана (краткое), не_сделанная <u>вовремя</u> работа. Слитно: несделанная работа." 
            }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
