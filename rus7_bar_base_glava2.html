<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 2. Повторение изученного в 5-6 классах — 7 класс</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #fcf9f5; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #27ae60; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d5f5e3; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2ecc71; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        
        .topic-card { background: #fffcf9; border: 1px solid #d5f5e3; border-left: 6px solid #2cc36b; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        
        .btn-toggle { background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #218c53; }
        
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d5f5e3; line-height: 1.6; color: #444; }
        .example { background: #e8f8f5; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #27ae60; color: #218c4e; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 2. Повторение изученного в 5-6 классах</h1>
        <div class="page-title">ФУНДАМЕНТАЛЬНЫЕ ПРАВИЛА И ОРФОГРАММЫ (БАЗОВЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { 
                id: "1", 
                title: "Фонетика и графика. Звуки и буквы", 
                text: "<strong>Фонетика</strong> изучает звуки речи, а <strong>графика</strong> — буквы, которыми эти звуки обозначаются на письме. Звуки бывают <strong>гласными</strong> (ударные и безударные) и <strong>согласными</strong>. Согласные делятся на звонкие/глухие и твердые/мягкие. Помните, что буквы Е, Ё, Ю, Я в начале слова, после гласных и после Ъ/Ь знаков обозначают сразу два звука.", 
                ex: "Пример: Слово 'Юла' состоит из 3 букв, но 4 звуков: [й'ула́], так как буква Ю стоит в самом начале слова." 
            },
            { 
                id: "2", 
                title: "Орфоэпия. Нормы произношения и ударения", 
                text: "<strong>Орфоэпия</strong> — это раздел лингвистики, определяющий правила правильного произношения звуков и расстановки ударений в словах. В русском языке ударение подвижное (может переходить на другие слоги при изменении формы слова) и разноместное.", 
                ex: "Сложные случаи для ВПР и ОГЭ: звони́т (не зво́нит), торты́ (не то́рты), облегчи́ть, балова́ть, жалюзи́." 
            },
            { 
                id: "3", 
                title: "Морфемика и словообразование. Разбор слова по составу", 
                text: "<strong>Морфемика</strong> изучает состав слова (морфемы). Минимальные значимые части слова — это <strong>корень</strong> (несет главный смысл), <strong>приставка</strong> (стоит перед корнем), <strong>суффикс</strong> (стоит после корня) и <strong>окончание</strong> (изменяемая часть, служит для связи слов). Приставка, корень и суффикс образуют <strong>основу слова</strong>. Окончание в основу никогда не входит!", 
                ex: "Разбор слова: В слове 'пригородный' корень -город-, приставка при-, суффикс -н-, окончание -ый. Основа слова — пригородн-." 
            },
            { 
                id: "4", 
                title: "Главные орфограммы корня: безударные гласные и чередования", 
                text: "Безударные гласные в корне бывают трёх видов: 1) <strong>Проверяемые</strong> (ищем однокоренное слово, где гласная под ударением); 2) <strong>Непроверяемые</strong> (словарные слова); 3) <strong>Чередующиеся</strong> (их нельзя проверять ударением, написание зависит от правил — суффикса А, ударения или согласной на конце корня).", 
                ex: "Чередование: Корень лаг-/лож- (пред<u>лаг</u>ать — пред<u>лож</u>ить), раст-/ращ-/рос- (<u>раст</u>ение — вы<u>ращ</u>енный — вы<u>рос</u>ли), кас-/кос- (<u>кас</u>аться — <u>кос</u>нуться)." 
            },
            { 
                id: "5", 
                title: "Правописание суффиксов и окончаний основных частей речи", 
                text: "Вспоминаем базу 5-6 классов. <strong>Существительные:</strong> Е пишется в окончаниях 1-го спр. в Д.п. и П.п. и 2-го спр. в П.п., И пишется у слов на -ия, -ие, -ий и в 3-м спр. <strong>Глаголы:</strong> написание безударных личных окончаний зависит от спряжения (1 спр. — -ешь, -ет, -ут/-ют; 2 спр. — -ишь, -ит, -ат/-ят).", 
                ex: "Глаголы: та́ять (1 спр. -> та́ет, та́ют), кле́ить (2 спр. -> кле́ит, кле́ят). Существительные: на лекци<u>и</u> (на -ия), в планетари<u>и</u> (на -ий), в тетрад<u>и</u> (3 спр.)." 
            }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
