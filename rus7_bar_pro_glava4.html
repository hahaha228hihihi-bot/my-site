<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 4. Переход частей речи — Русский язык 7 класс</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #1f618d; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 4. Переход слов из одной части речи в другую</h1>
        <div class="page-title">СУБСТАНТИВАЦИЯ И АДЪЕКТИВАЦИЯ (УГЛУБЛЁННЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { id: "1", title: "Субстантивация — переход прилагательных и причастий в существительные", text: "<strong>Субстантивация</strong> — процесс превращения других частей речи в существительные. Слово полностью теряет синтаксическую зависимость, начинает обозначать предмет (а не его признак) и в предложении становится подлежащим или дополнением.", ex: "Сравнение: <i>Мороженое</i> мясо (прил.) — Ванильное <i>мороженое</i> (сущ.). <i>Военный</i> билет (прил.) — Вызвали <i>военного</i> (сущ.)." },
            { id: "2", title: "Адъективация — превращение причастий в имена прилагательные", text: "<strong>Адъективация</strong> происходит, когда причастие теряет значение действия во времени и начинает обозначать постоянный, стабильный признак предмета. От этого коренным образом меняется орфография: отглагольные прилагательные теряют зависимые слова и пишутся с одной буквой Н.", ex: "Сравнение: Котлета, <i>жаренная</i> на масле (прич., совершается действие) — <i>Жареная</i> котлета (прил., постоянное свойство)." },
            { id: "3", title: "Пронаминализация — переход слов в разряд местоимений", text: "При <strong>пронаминализации</strong> знаменательные слова (существительные, прилагательные, числительные) теряют своё лексическое значение и начинают выполнять функцию указания на предмет или признак, работая как чистые местоимения.", ex: "Пример: В <i>один</i> прекрасный день (в значении местоимения 'некоторый', а не числительного 'один'). <i>Данный</i> вопрос (в значении 'этот')." },
            { id: "4", title: "Переход слов в разряд производных предлогов и союзов", text: "Морфологическая система динамична: существительные с предлогами, наречия и деепричастия при потере лексического значения становятся служебными частями речи. Они перестают отвечать на вопросы и связывают компоненты предложения.", ex: "Сравнение: Шёл, <i>несмотря</i> по сторонам (дееприч.) — Пришёл, <i>несмотря на</i> сильный ливень (производный предлог)." },
            { id: "5", title: "Интеръективация — переход знаменательных слов в междометия", text: "<strong>Интеръективация</strong> — превращение слов в эмоциональные или побудительные междометия. Полнозначные слова теряют номинативную функцию и превращаются в чистые восклицания.", ex: "Пример: <i>Батюшки!</i> (выражение испуга или удивления). <i>Глупости!</i> (выражение пренебрежения). <i>Караул!</i> (призыв о помощи)." }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
