<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 8. Культура речи — Русский язык 7 класс</title>
    <style>
        /* Стили идентичны */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #1f618d; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 8. Культура речи и орфоэпия</h1>
        <div class="page-title">ОРФОЭПИЧЕСКИЕ И СТИЛИСТИЧЕСКИЕ НОРМЫ (УГЛУБЛЁННЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { id: "1", title: "Акцентологические нормы причастий повышенной сложности", text: "<strong>Акцентология</strong> (наука об ударении) в 7 классе проверяет сложные случаи в гибридных формах глагола. В кратких страдательных причастиях женского рода ударение всегда падает исключительно на окончание, а в действительных причастиях прошедшего времени оно стабильно держится на том же слоге, что и в инфинитиве перед суффиксом -ТЬ.", ex: "Пример: наня́ть — наня́вший, но на́нятый — нанята́ (строго на А). Наве́даться — наве́давшийся. Премирова́ть — премиро́ванный." },
            { id: "2", title: "Орфоэпические нормы произношения согласных звуков перед Е", text: "В заимствованных словах согласные перед буквой Е могут произноситься мягко или оставаться твердыми. Смешение этих норм считается речевой ошибкой. Свод правил регулирует произношение медицинских, научных и компьютерных терминов.", ex: "Твёрдый звук: те[тэ]рмос, де[дэ]нег нет, компью[тэ]р, се[сэ]ссия, анесте[тэ]зия. / Мягкий звук: де[д'э]фис, музе[з'э]й, ре[р'э]льс, шине[н'э]ль." },
            { id: "3", title: "Произношение сочетания согласных ЧН и ЧТ", text: "Историческая норма московского произношения требовала заменять звуки ЧН на [ШН], а ЧТ — на [ШТ]. В современном языке многие слова перешли на буквенное произношение [ЧН], однако ряд устойчивых лексем сохраняет старую строгую орфоэпическую норму.", ex: "Произносим [ШН]/[ШТ]: коне́чно [коне́шно], ску́чно [ску́шно], яи́чница [яи́шница], пустя́чный [пустя́шный], что [што]." },
            { id: "4", title: "Грамматические ошибки при управлении производными предлогами", text: "Производные предлоги причинно-следственного значения <strong>БЛАГОДАРЯ, СОГЛАСНО, ВОПРЕКИ, НАПЕРЕКОР, СООБРАЗНО</strong> по строгой литературной норме требуют после себя существительного исключительно в форме <strong>Дательного падежа</strong> (кому? чему?). Использование Родительного падежа недопустимо.", ex: "Ошибка: Согласно <i>приказа</i> начальника, вопреки <i>мнения</i> большинства. / Правильно: Согласно <i>приказу</i> (Д.п.), вопреки <i>мнению</i> (Д.п.)." },
            { id: "5", title: "Речевые нормы при координации подлежащего и сказуемого", text: "Сложные случаи согласования главных членов предложения, когда подлежащее выражено собирательным существительным (<i>большинство, часть, множество</i>) или местоимениями <i>кто, никто, те, все</i>. Неверный выбор числа глагола искажает синтаксическую структуру.", ex: "Ошибка: Те, кто <i>пришли</i> на лекцию, сдали тетради. / Правильно: Те (мн.ч.), кто <i>пришёл</i> (ед.ч. при 'кто'), сдали тетради." }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
