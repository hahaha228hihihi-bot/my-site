<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Базовый уровень — Глава 5</title>
    <style>
        /* Стили аналогичны */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #27ae60; margin-bottom: 20px; font-size: 1.8rem; border-bottom: 2px solid #d5f5e3; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #27ae60; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #fdfefe; border: 1px solid #d5f5e3; border-left: 6px solid #2ecc71; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #2c3e50; }
        .btn-toggle { background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #218c53; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d5f5e3; line-height: 1.6; color: #444; }
        .example { background: #e8f8f5; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #27ae60; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к списку глав</a>
        <h1>Глава 5. Энергетические законы в механике (Базовый уровень)</h1>
        <div id="topics-root"></div>
    </div>

    <script>
        const data = [
            { num: "53-54", name: "Механическая работа и мощность", text: "Работа (A) совершается, когда мы прикладываем силу и двигаем предмет. Если предмет стоит на месте, работа равна нулю. Мощность (N) показывает, насколько быстро выполняется эта работа.", ex: "Формулы: Работа A = F * s (Джоули). Мощность N = A / t (Ватты)." },
            { num: "55-57", name: "Кинетическая и потенциальная энергия. Закон сохранения", text: "Энергия — это запас сил для совершения работы. Движущиеся тела обладают кинетической энергией. Потенциальной энергией обладают тела, которые подняты над землей или сжаты (пружины). Энергия не исчезает, она лишь превращается из одного вида в другой.", ex: "Пример: На вершине горки у санок максимальная потенциальная энергия. При спуске она полностью переходит в кинетическую." },
            { num: "58-61", name: "Простые механизмы. Рычаг и блоки", text: "Простые механизмы (рычаг, блоки, наклонная плоскость) помогают людям поднимать тяжести с меньшим усилием. 'Золотое правило механики': ни один механизм не дает выигрыша в работе. Во сколько раз мы выигрываем в силе, во столько же раз проигрываем в расстоянии.", ex: "Пример: Подвижный блок позволяет поднять груз силой в 2 раза меньше его веса, но веревку придется тянуть в 2 раза длиннее." },
            { num: "62", name: "Коэффициент полезного действия (КПД)", text: "Из-за трения часть работы всегда тратится впустую (на нагрев деталей). КПД показывает, какая доля работы пошла на реальную пользу. КПД никогда не бывает равен или больше 100%.", ex: "Формула: η = (Полезная работа / Затраченная работа) * 100%." }
        ];

        const container = document.getElementById('topics-root');
        data.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграфы ${t.num}. ${t.name}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
