<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 9. Лексикография — Русский язык 7 класс</title>
    <style>
        /* Стили идентичны */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #1f618d; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 9. Лексикография</h1>
        <div class="page-title">СЛОВАРНЫЙ СОСТАВ И ТИПЫ СЛОВАРЕЙ (УГЛУБЛЁННЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { id: "1", title: "Лексикография как лингвистическая наука. Устройство словарной статьи", text: "<strong>Лексикография</strong> — раздел языкознания, изучающий теорию и практику составления словарей. На углубленном филологическом уровне статья толкового словаря анализируется как комплексный источник: исследуются заголовочное слово, грамматические свойства (род, падежные формы), стилистические пометы, толкование смыслов, иллюстративный материал и историческая справка.", ex: "Пометы: Например, помета '<i>книжн.</i>' или '<i>ирон.</i>' строго указывает на функционально-стилевые ограничения использования слова." },
            { id: "2", title: "Энциклопедические и лингвистические словари. Различия задач", text: "Все словари делятся на две глобальные группы. <strong>Энциклопедические словари</strong> описывают сами предметы, научные понятия, исторические события и биографии людей (биологию, географию, космос). <strong>Лингвистические словари</strong> описывают исключительно слова — их значения, правописание, произношение, морфемный состав и происхождение.", ex: "Разница: Энциклопедия расскажет, из каких химических элементов состоит <i>золото</i>. Лингвистический словарь объяснит, что <i>золото</i> — это неодушевлённое существительное среднего рода, и укажет его переносные значения." },
            { id: "3", title: "Академические толковые словари русского языка. История и современность", text: "Главными хранителями норм являются академические толковые словари. Исторический фундамент заложил 'Толковый словарь живого великорусского языка' В. И. Даля. В XX веке эталоном стали словари под редакцией Д. Н. Ушакова и С. И. Ожегова. Сегодня высшим академическим авторитетом обладает БАС — Большой академический словарь.", ex: "Факт: Словарь Даля строился по алфавитно-гнездовому принципу (однокоренные слова собраны вместе), а современные словари — строго по алфавитному принципу." },
            { id: "4", title: "Этимологические словари как ключ к историческим тайнам слов", text: "<strong>Этимологические словари</strong> (например, словари М. Фасмера или Н. М. Шанского) объясняют происхождение слова, раскрывают его первоначальный праславянский корень, исторические звуковые изменения и связи с другими индоевропейскими языками. Работа с ними помогает понять логику орфографических правил.", ex: "Этимология: Слово 'впечатление' возникло в русском языке XVIII века как точная калька-перевод французского 'impression' (от imprimere — впечатывать, прессовать)." },
            { id: "5", title: "Специализированные аспекты лингвистических словарей", text: "Для решения узких языковых задач углублённая лингвистика использует специализированные словари: <strong>фразеологические</strong> (устойчивые обороты), <strong>словари синонимов и антонимов</strong>, <strong>орфоэпические</strong> (правильное ударение) и уникальные <strong>словари омонимов и паронимов</strong>, предотвращающие смешение похожих слов.", ex: "Работа со словарём: Словарь паронимов чётко разграничивает слова <i>адресат</i> (получатель) и <i>адресант</i> (отправитель), спасая от лексических ошибок." }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
