<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 3. Историческая грамматика — Русский язык 7 класс</title>
    <style>
        /* Стили идентичны */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #1f618d; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 3. Историческая грамматика</h1>
        <div class="page-title">ЭВОЛЮЦИЯ ГЛАГОЛЬНЫХ И ГИБРИДНЫХ ФОРМ (УГЛУБЛЁННЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { id: "1", title: "Происхождение деепричастий из кратких действительных причастий", text: "В древнерусском языке <strong>деепричастий как отдельной части речи не было</strong>. Они развились к XIV-XV векам из кратких действительных причастий. Потеряв способность изменяться по родам, числам и падежам, эти причастия застыли в одной форме Именительного падежа и стали обозначать добавочное действие.", ex: "Пример: Древнее краткое причастие женского рода <i>несъши</i> (несущая) превратилось в неизменяемое деепричастие <i>несши</i>." },
            { id: "2", title: "Разрушение категории двойственного числа в морфологии", text: "Древнерусская морфология имела не две формы числа, а три: единственное, множественное и <strong>двойственное число</strong>. Двойственное число использовалось строго для обозначения двух или парных предметов (очи, рога, руки, два брата). К XIV веку оно полностью исчезло, оставив лишь редкие следы в окончаниях.", ex: "След в языке: Формы 'колена', 'плечи', 'очи', а также окончание числительного 'двадцать' (два-десять) — это остатки древнего двойственного числа." },
            { id: "3", title: "Четыре древних прошедших времени глагола", text: "Система прошедшего времени была огромной. Существовало два простых времени: <strong>аорист</strong> (короткое законченное действие в прошлом) и <strong>имперфект</strong> (длительное незавершенное действие). И два сложных: <strong>перфект</strong> (прошлое действие, результат которого важен сейчас) и <strong>плюсквамперфект</strong> (предпрошедшее время).", ex: "Пример аориста: <i>приде</i> (пришёл), <i>рече</i> (сказал). Эти формы часто встречаются в летописях и сказках." },
            { id: "4", title: "Происхождение современного прошедшего времени на -Л", text: "Современная форма прошедшего времени (<i>ходил, читал, спал</i>) исторически образовалась из древнего сложного времени — <strong>перфекта</strong>. Он состоял из глагола-связки 'быть' в настоящем времени и особого причастия на -Л. Со временем связка отмерла, а причастие на -Л стало обычным глаголом прошедшего времени (именно поэтому оно изменяется по родам, но не по лицам!).", ex: "Схема: Древнее сочетание 'я есмь писалъ' потеряло связку 'есмь' и превратилось в современное 'я писал'." },
            { id: "5", title: "История звательного падежа (Седьмой падеж)", text: "В древнерусском языке помимо 6 основных падежей существовал седьмой — <strong>звательный падеж</strong>. Он использовался исключительно при обращении к лицу или предмету. К XIV веку он отмер, но его формы сохранились в религиозных текстах, фразеологизмах и классической литературе.", ex: "Следы падежа: <i>Отче! Боже! Господи! Человече! Княже!</i> В современном языке формируется новый разговорный звательный падеж: <i>Мам! Пап! Вань!</i>" }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
