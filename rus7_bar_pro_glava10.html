<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 10. Стилистическая правка — Русский язык 7 класс</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #1f618d; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 10. Стилистическая правка текстов</h1>
        <div class="page-title">РЕДАКТИРОВАНИЕ И РЕЧЕВЫЕ ОШИБКИ (УГЛУБЛЁННЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { id: "1", title: "Речевая избыточность. Плеоназм и его виды", text: "<strong>Плеоназм</strong> — это оборот речи, в котором необоснованно дублируется смысл и употребляются лишние слова. В углублённом курсе различают скрытые плеоназмы, когда иноязычное слово соединяется с русским, имеющим то же значение.", ex: "Ошибка: Главная суть, внутренний интерьер, первая премьера, ценные сокровища. Правка: Суть, интерьер, премьера, сокровища." },
            { id: "2", title: "Тавтология и способы её устранения", text: "<strong>Тавтология</strong> — повторение однокоренных слов или одинаковых морфем в границах одного предложения. Исправляется заменой одного из слов синонимом, местоимением или полным перестроением синтаксической конструкции.", ex: "Ошибка: Спросить вопрос, проливной ливень лил, соединить воедино. Правка: Задать вопрос, ливень лил, соединить." },
            { id: "3", title: "Стилистический диссонанс. Анахронизмы и смешение стилей", text: "<strong>Смешение стилей</strong> — использование лексики одного стиля (например, разговорного) в контексте другого (например, официально-делового). К этому относятся и <i>анахронизмы</i> — нарушение временной точности при использовании исторических понятий.", ex: "Ошибка: Ввиду сильной метели самолёты <i>дали дёру</i> обратно. Правка: Ввиду сильной метели самолёты вернулись на аэродром." },
            { id: "4", title: "Речевая недостаточность и пропуск слов", text: "<strong>Речевая недостаточность</strong> — случайный пропуск слова, необходимого для точного выражения мысли. Из-за этого предложение теряет логику или приобретает абсурдный комический смысл.", ex: "Ошибка: На совете школы обсуждали поведение учеников и родителей (пропущено слово: 'отношение'). Правка: ...поведение учеников и отношение родителей." },
            { id: "5", title: "Нарушение лексической сочетаемости слов", text: "Многие слова в русском языке могут употребляться друг с другом только в строгих, исторически сложившихся парах. Нарушение этих устойчивых связей приводит к грубым речевым ошибкам.", ex: "Ошибка: Играть значение (смешение фраз 'играть роль' и 'иметь значение'), одержать первенство (одержать победу / завоевать первенство)." }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
