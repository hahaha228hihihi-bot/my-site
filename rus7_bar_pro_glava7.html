<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 7. Анализ художественного текста — Русский язык 7 класс</title>
    <style>
        /* Стили идентичны */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #1f618d; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 7. Комплексный анализ художественного текста</h1>
        <div class="page-title">ТЕКСТОВЕДЕНИЕ И ИНТЕРПРЕТАЦИЯ (УГЛУБЛЁННЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { id: "1", title: "Методика комплексного анализа: от фонетики к идейному замыслу", text: "<strong>Лингвистический анализ</strong> требует сквозного исследования всех языковых пластов. Мы анализируем звукопись (аллитерацию и ассонанс), морфологические особенности (частотность причастий/наречий) и синтаксические фигуры, чтобы раскрыть скрытый подтекст произведения.", ex: "Пример: Обилие глухих шипящих согласных в описании осеннего леса создаёт звуковую иллюзию шуршания увядающей листвы." },
            { id: "2", title: "Роль морфологических форм в создании художественного образа", text: "Выбор автором конкретных форм частей речи всегда несёт эстетическую нагрузку. Например, высокая концентрация глаголов и деепричастий придаёт тексту стремительную динамику, а преобладание причастий и прилагательных — статичность и живописность.", ex: "Пример: Описание шторма с помощью цепочки деепричастий (<i>вскипая, грохоча, разбиваясь</i>) заставляет читателя физически ощутить силу стихии." },
            { id: "3", title: "Изобразительно-выразительные функции служебных частей речи", text: "Даже предлоги и союзы могут становиться художественными тропами. Например, <strong>многосоюзие (полисиндетон)</strong> замедляет темп повествования, придавая тексту библейскую торжественность, или подчёркивает колоссальные масштабы перечисляемых явлений.", ex: "Пример: '<i>И</i> пращ, <i>и</i> стрела, <i>и</i> лукавый кинжал года щадят левофлангового...' — повторение союза 'и' усиливает значимость каждого предмета." },
            { id: "4", title: "Синтаксические фигуры: Риторический вопрос, Восклицание, Повтор", text: "Художественный синтаксис использует фигуры речи для управления эмоциями читателя. Риторические вопросы не требуют ответа, а активизируют внимание; синтаксический параллелизм (одинаковое построение соседних фраз) создаёт стихотворный ритм прозы.", ex: "Пример: 'Что ищет он в стране далёкой? Что кинул он в краю родном?' — классический синтаксический параллелизм и риторические вопросы." },
            { id: "5", title: "Понятие об интертекстуальности и скрытых цитатах", text: "На продвинутом филологическом уровне текст анализируется в контексте всей мировой литературы. Мы ищем <strong>аллюзии</strong> (намеки на исторические или литературные факты) и <i>реминисценции</i> (бессознательные или намеренные отголоски чужих текстов в речи автора).", ex: "Пример: Использование выражений вроде 'рыцарь на час' или 'разбитое корыто' отсылает читателя к классическим произведениям Некрасова и Пушкина." }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
