<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 6. Наречие (PRO) — 7 класс Разумовская</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; text-align: center; margin-bottom: 5px; font-size: 2.2rem; }
        .page-title { text-align: center; color: #7f8c8d; font-size: 1.1rem; margin-bottom: 35px; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; font-weight: bold; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 18px; border-radius: 8px; margin-bottom: 12px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .topic-name { font-size: 1.05rem; font-weight: bold; color: #333; line-height: 1.4; }
        
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
        .btn-toggle:hover { background: #1f618d; }
        
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="rus7_program.html?author=razumovskaya" class="back-link">← Назад к выбору глав</a>
        <h1>Глава 6. Морфология. Наречие</h1>
        <div class="page-title">ПО ОРИГИНАЛЬНОМУ ОГЛАВЛЕНИЮ М. М. РАЗУМОВСКОЙ (12 ПАРАГРАФОВ — PRO)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { id: "27", title: "Наречие как знаменательная часть речи. Процессы адвербиализации", text: "<strong>Наречие</strong> обозначает непроцессуальный признак действия, признак другого признака или предмета. На продвинутом уровне изучается <i>адвербиализация</i> — исторический переход слов других частей речи в разряд неизменяемых наречий.", ex: "Пример: Идти <i>шагом</i> (существительное в Т.п. полностью перешло в наречие образа действия)." },
            { id: "28", title: "Смысловые разряды наречий. Семантические нюансы", text: "Детальный разбор разрядов. Помимо стандартных групп (места, времени, образа действия) глубоко анализируются определительные наречия меры, степени и качественные наречия.", ex: "Пример: Сделать <i>сгоряча</i> (причина), <i>крайне</i> интересный (мера и степень), разбить <i>вдребезги</i> (образа действия)." },
            { id: "29", title: "Степени сравнения наречий. Грамматическая омонимия", text: "Сравнительная и превосходная степени качественных наречий на -О/-Е. Разбирается главная ловушка: как отличить простую сравнительную степень наречия от сравнительной степени прилагательного.", ex: "Сравнение: Этот дом <i>выше</i> сосны (прилагательное, относится к дому). / Самолёт взлетел <i>выше</i> птиц (наречие, относится к глаголу)." },
            { id: "30", title: "Слитное и раздельное написание НЕ с наречиями. Олимпийский практикум", text: "Анализ синонимических замен. Раздельное написание диктуется не только союзом А, но и логическим подчеркиванием отрицания, а также скрытыми контекстными усилителями.", ex: "Раздельно: Сдал работу далеко не_плохо, ничуть не_интересно. Слитно: Сделал неаккуратно (=плохо)." },
            { id: "31", title: "Буквы Е и И в приставках НЕ- и НИ- отрицательных наречий", text: "Орфографический алгоритм зависит исключительно от ударения. Под ударением пишется приставка <strong>НЕ-</strong>, без ударения — строго приставка <strong>НИ-</strong>. Отрицательные наречия всегда пишутся слитно.", ex: "Пример: Н<strong>е́</strong>где присесть, н<strong>е́</strong>когда объяснять. / Н<strong>и</strong>где́ не обнаружили, н<strong>и</strong>когда́ не соглашусь." },
            { id: "32", title: "Правописание Н и НН в наречиях. Морфемная преемственность", text: "В наречиях на -О/-Е пишется столько же букв Н, сколько в производящей основе прилагательного или причастия. Включается контроль цепочек словообразования.", ex: "Пример: Мужественный -> мужестве<i>нн</i>о боролся. Растерянный -> смотрел растеря<i>нн</i>о. Путаный -> объяснял пута<i>н</i>о." },
            { id: "33", title: "Буквы О и Е после шипящих на конце наречий. Специфика ударения", text: "На конце наречий после шипящих под ударением пишется суффикс <strong>-О</strong>, в безударном положении — суффикс <strong>-Е</strong>. Историческое исключение восходит к древнерусским формам.", ex: "Под ударением: горяч<b>о́</b>, свеж<b>о́</b>. Без ударения: неуклю́ж<b>е</b>, злове́щ<b>е</b>. Исключение: ещё (всегда с Ё)." },
            { id: "34", title: "Буквы О и А на конце наречий с приставками. Историческое происхождение", text: "В наречиях с приставками <strong>ИЗ-, ДО-, С-</strong> пишется суффикс <strong>А</strong> (если они образованы от бесприставочных прилагательных). С приставками <strong>В-, НА-, ЗА-</strong> пишется суффикс <strong>О</strong>. Работает 'правило окна'.", ex: "Проверка: <strong>из</strong>давн<b>а</b> (из окн<i>а</i>), <strong>до</strong>сыт<b>а</b> (до окн<i>а</i>). / <strong>в</strong>прав<b>о</b> (в окн<i>о</i>), <strong>за</strong>темн<b>о</b> (за окн<i>о</i>)." },
            { id: "35", title: "Дефис между приставкой и суффиксом в наречиях. Системные правила", text: "Дефис пишется после приставки <strong>ПО-</strong> при наличии суффиксов <strong>-ОМУ, -ЕМУ, -И</strong>. А также после приставок <strong>В- / ВО-</strong> в наречиях, образованных от порядковых числительных.", ex: "Пример: поступать <strong>по</strong>-товарищеск<b>и</b>, думать <strong>по</strong>-сво<b>ему</b>. <strong>Во</strong>-перв<b>ых</b>, <strong>в</strong>-пят<b>ых</b>." },
            { id: "36", title: "Слитное и раздельное написание наречий, образованных от существительных", text: "Сложнейший раздел. Наречия пишутся слитно, если образованы от мёртвых основ (<i>навзничь, вдребезги</i>) или если между предлогом-приставкой и словом нельзя безболезненно вклинить определение.", ex: "Слитно: вкрутую, вслух, наперерез. Раздельно (наречные сочетания): под утро, на миг, в праздники." },
            { id: "37", title: "Буква Ь после шипящих на конце наречий. Исторические исключения", text: "На конце наречий после шипящих (Ж, Ч, Ш, Щ) всегда пишется <strong>буква Ь</strong> (ерь), выполняющая историческую функцию обозначения мягкости. Нужно твёрдо помнить три слова-исключения.", ex: "С мягким знаком: настежь, сплошь, вскачь, навзничь. Исключения: <strong>уж, замуж, невтерпёж</strong>." },
            { id: "38", title: "Морфологический разбор наречия. Продвинутая схема", text: "Полный лингвистический анализ: определение разряда, характера производящей основы, выявление степени сравнения, доказательство неизменяемости и синтаксическая функция предикативного обстоятельства.", ex: "Схема: В предложении 'Он говорил <i>тихо</i>' слово 'тихо' — наречие, неизменяемое, образа действия, обстоятельство." }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
