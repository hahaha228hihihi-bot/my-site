<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 6. Синонимика служебных слов — Русский язык 7 класс</title>
    <style>
        /* Стили идентичны */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #1f618d; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 6. Синонимика служебных частей речи</h1>
        <div class="page-title">БОГАТСТВО И СТИЛИСТИКА РЕЧИ (УГЛУБЛЁННЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { id: "1", title: "Синонимия производных и непроизводных предлогов", text: "Замена предлогов позволяет разнообразить текст и менять его стилистическую тональность. Непроизводные предлоги обычно нейтральны, в то время как производные (отыменные) предлоги придают речи официальный, научный или деловой характер.", ex: "Пример: Не пришёл <i>из-за</i> болезни (разг.) — Отсутствовал <i>ввиду</i> болезни / <i>вследствие</i> болезни (деловой стиль)." },
            { id: "2", title: "Варианты управления при синонимии предлогов", text: "При замене предлогов важно строго отслеживать падеж существительного, так как разные предлоги требуют разных падежных окончаний. Нарушение этой нормы приводит к грубым речевым ошибкам.", ex: "Пример: Предлог <i>из-за</i> требует Родительного падежа (из-за туч), а синонимичный производный предлог <i>благодаря</i> — строго Дательного падежа (благодаря помощи)." },
            { id: "3", title: "Синонимия сочинительных и подчинительных союзов", text: "Использование синонимичных союзов связывает простые предложения внутри сложных с разным логическим акцентом, помогая переходить от простого противопоставления к выражению уступки или причины.", ex: "Пример: Задача была трудной, <i>но</i> мы её решили. -> <i>Хотя</i> задача была трудной, мы её решили (союз 'но' заменён подчинительным уступительным 'хотя')." },
            { id: "4", title: "Синонимика модальных и смысловых частиц в тексте", text: "Смысловые частицы обладают огромным потенциалом для создания тончайших эмоциональных оттенков речи. Замена частиц помогает автору регулировать степень уверенности, выделения или усиления мысли.", ex: "Пример: <i>Именно</i> этот день стал решающим. / <i>Как раз</i> этот день стал решающим. <i>Неужели</i> ты забыл? / <i>Разве</i> ты забыл?" },
            { id: "5", title: "Взаимозаменяемость придаточных предложений и полупредикативных оборотов", text: "Высшая синонимика синтаксиса — замена придаточных частей сложноподчинённого предложения (СПП) на причастные или деепричастные обороты, что делает текст более лаконичным, динамичным и книжным.", ex: "Пример: Птицы, <i>которые прилетели с юга</i>, свили гнёзда. -> Птицы, <u>прилетевшие с юга</u>, свили гнёзда." }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
