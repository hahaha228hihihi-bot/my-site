<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 7. Категория состояния — 7 класс Разумовская</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #fcf9f5; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #27ae60; text-align: center; margin-bottom: 5px; font-size: 2.2rem; }
        .page-title { text-align: center; color: #7f8c8d; font-size: 1.1rem; margin-bottom: 35px; border-bottom: 2px solid #d5f5e3; padding-bottom: 10px; font-weight: bold; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2ecc71; text-decoration: none; font-weight: bold; }
        .topic-card { background: #fffcf9; border: 1px solid #d5f5e3; border-left: 6px solid #2cc36b; padding: 18px; border-radius: 8px; margin-bottom: 12px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .topic-name { font-size: 1.05rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #27ae60; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d5f5e3; line-height: 1.6; color: #444; }
        .example { background: #e8f8f5; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #27ae60; color: #218c4e; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="rus7_program.html?author=razumovskaya" class="back-link">← Назад к выбору глав</a>
        <h1>Глава 7. Категория состояния</h1>
        <div class="page-title">ПО ОРИГИНАЛЬНОМУ ОГЛАВЛЕНИЮ М. М. РАЗУМОВСКОЙ</div>
        <div id="topics-root"></div>
    </div>
    <script>
        const chapterData = [
            { id: "39", title: "Слова категории состояния как часть речи", text: "<strong>Категория состояния</strong> (или слова категории состояния) — самостоятельная часть речи, обозначающая состояние природы, окружающей среды, физическое или душевное состояние человека. Отвечает на вопросы <i>как? каково?</i> и является абсолютно неизменяемой.", ex: "Пример: На улице <i>морозно</i> (природа). Мне стало <i>грустно</i> (душа человека)." },
            { id: "40", title: "Разграничение слов категории состояния и омонимичных им наречий и кратких прилагательных", text: "Слова на -О различают по роли в предложении: <br>• <strong>Прилагательное</strong> относится к существительному и является определением/сказуемым (<i>лицо грустно</i>). <br>• <strong>Наречие</strong> относится к глаголу и является обстоятельством (<i>грустно посмотрел</i>). <br>• <strong>Категория состояния</strong> стоит автономно в безличном предложении и является сказуемым (<i>мне грустно</i>).", ex: "Сравнение: Окно <i>темно</i> (кратк. прил.) — Вдали <i>темно</i> белеют горы (нареч.) — В комнате <i>темно</i> (категория состояния)." }
        ];
        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `<div class="topic-card"><div class="topic-header"><div class="topic-name">Параграф ${t.id}. ${t.title}</div><button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button></div><div class="topic-details"><p>${t.text}</p><div class="example">${t.ex}</div></div></div>`;
        });
        function toggleTopic(button) {
            const d = button.closest('.topic-card').querySelector('.topic-details');
            if (d.style.display === 'block') { d.style.display = 'none'; button.innerText = 'Развернуть'; }
            else { d.style.display = 'block'; button.innerText = 'Свернуть'; }
        }
    </script>
</body>
</html>
