<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 2. Пространство, время и движение</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; margin-bottom: 20px; font-size: 1.8rem; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #fdfefe; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #2c3e50; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #1f618d; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к списку глав</a>
        <h1>Глава 2. Пространство, время и движение (Параграфы 7-13)</h1>
        <div id="topics-root"></div>
    </div>

    <script>
        const topics = [
            { 
                num: 7, 
                name: "Механическое движение", 
                text: "Механическое движение — это процесс изменения взаимного расположения тел или их частей в пространстве с течением времени. Движение абсолютно, но его описание всегда относительно. Для описания вводят систему отсчета: тело отсчета, связанную с ним систему координат и прибор для отсчета времени (часы). В зависимости от формы траектории движение делят на прямолинейное и криволинейное.", 
                ex: "Важно: Без указания тела отсчета утверждение о том, что тело движется, теряет всякий физический смысл." 
            },
            { 
                num: 8, 
                name: "Траектория, путь и перемещение", 
                text: "Траектория — непрерывная воображаемая линия, которую описывает материальная точка при своём движении. Путь (s) — длина участка траектории, пройденного телом за фиксированный промежуток времени (скалярная величина, s ≥ 0). Перемещение (s с вектором) — направленный отрезок прямой, соединяющий начальное положение тела с его последующим положением (векторная величина).", 
                ex: "Формула геометрии: При движении точки по окружности радиуса R за один полный оборот путь равен s = 2πR, а модуль перемещения равен 0." 
            },
            { 
                num: 9, 
                name: "Равномерное движение. Скорость", 
                text: "Равномерное движение — движение, при котором тело за любые бесконечно малые равные промежутки времени совершает одинаковые перемещения. Скорость равномерного прямолинейного движения — векторная величина, равная отношению перемещения тела к промежутку времени, за которое оно произошло. Направление вектора скорости всегда совпадает с направлением перемещения.", 
                ex: "Формула: v = s / t. Для перевода из км/ч в м/с значение необходимо разделить на 3.6 (например, 72 км/ч = 20 м/с)." 
            },
            { 
                num: 10, 
                name: "Неравномерное движение. Средняя скорость", 
                text: "Если тело за равные промежутки времени совершает разные перемещения, движение называют неравномерным. Для его макроскопического описания вводят среднюю путевую скорость (v_ср), равную отношению всего пройденного пути ко всему затраченному времени (включая остановки). На углубленном уровне также рассматривают мгновенную скорость — скорость тела в данной конкретной точке траектории в данный момент времени.", 
                ex: "Формула: v_ср = (s1 + s2 + ...) / (t1 + t2 + ...). Средняя скорость не равна среднему арифметическому скоростей, если промежутки времени на участках не равны!" 
            },
            { 
                num: 11, 
                name: "Явление инерции", 
                text: "Инерция — это фундаментальное физическое явление, заключающееся в том, что тело сохраняет состояние покоя или равномерного прямолинейного движения, если на него не действуют другие тела или их действия взаимно компенсируются. Движение тела при скомпенсированных внешних силах называется движением по инерции. Инерция лежит в основе Первого закона Ньютона.", 
                ex: "Физический факт: При резком повороте автомобиля направо пассажиры по инерции продолжают двигаться прямо, из-за чего их прижимает к левой стенке салона." 
            },
            { 
                num: 12, 
                name: "Взаимодействие тел. Масса", 
                text: "Скорость тела не может измениться сама по себе — для этого требуется взаимодействие с другим телом. При взаимодействии оба тела меняют свои скорости, причём в разной степени. Свойство тела по-разному менять скорость при взаимодействии называется инертностью. Масса (m) — скалярная физическая величина, являющаяся количественной мерой инертности тела. Чем больше масса, тем труднее изменить скорость тела.", 
                ex: "Закон взаимодействия: Отношение масс двух взаимодействующих тел обратно пропорционально отношению модулей изменений их скоростей: m1 / m2 = |Δv2| / |Δv1|." 
            },
            { 
                num: 13, 
                name: "Плотность вещества", 
                text: "Плотность (ρ) — это физическая величина, определяемая массой вещества, содержащейся в единице объёма. Плотность зависит от химического состава вещества, компактности упаковки его молекул и агрегатного состояния. У газов плотность минимальна из-за огромных межмолекулярных расстояний. Плотность сплавов или неоднородных тел рассчитывается как средняя плотность.", 
                ex: "Формула: ρ = m / V. Отсюда масса m = ρV, а объём V = m / ρ. Единица измерения: кг/м³ (1 г/см³ = 1000 кг/м³). Плотность чистой воды равна 1000 кг/м³." 
            }
        ];

        const container = document.getElementById('topics-root');
        topics.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.num}. ${t.name}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
