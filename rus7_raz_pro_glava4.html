<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 4. Причастие (PRO) — 7 класс Разумовская</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; text-align: center; margin-bottom: 5px; font-size: 2.2rem; }
        .page-title { text-align: center; color: #7f8c8d; font-size: 1.1rem; margin-bottom: 35px; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; font-weight: bold; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 18px; border-radius: 8px; margin-bottom: 12px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .topic-name { font-size: 1.05rem; font-weight: bold; color: #333; line-height: 1.4; }
        
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
        .btn-toggle:hover { background: #1f618d; }
        
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="rus7_program.html?author=razumovskaya" class="back-link">← Назад к выбору глав</a>
        <h1>Глава 4. Морфология. Причастие</h1>
        <div class="page-title">ПО ОРИГИНАЛЬНОМУ ОГЛАВЛЕНИЮ М. М. РАЗУМОВСКОЙ (13 ПАРАГРАФОВ — PRO)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { id: "8", title: "Причастие как приактивно-глагольная форма. Лингвистическая природа", text: "Исследование гибридной природы причастия. Анализируется, как оно сочетает в себе глагольную семантику (процессуальный признак, вид, время) и адъективное склонение прилагательного. Особое внимание — отсутствию форм будущего времени.", ex: "Пример: Строящийся (наст. вр.) — строившийся (прош. вр.). Формы будущего времени в системе русского причастия не существует." },
            { id: "9", title: "Склонение полных причастий и орфография сложных падежных форм", text: "Анализ падежных парадигм. Разбираются трудные случаи правописания безударных окончаний в Творительном и Предложном падежах мужского/среднего рода, где школьники часто путают суффиксы прилагательных и причастий.", ex: "Ловушка: Об управляем<b>ом</b> (как<b>ом</b>? — П.п.) объекте, но владеем<b>ым</b> (как<b>им</b>? — Т.п.) имуществом." },
            { id: "10", title: "Причастный оборот. Сложные случаи пунктуации и инверсии", text: "Обособление полупредикативных конструкций. Изучается синтаксическая инверсия, когда зависимые слова разрывают оборот, а также правила пунктуации при определяемом слове, выраженном личным местоимением (обособляется ВСЕГДА).", ex: "Пример: <u>Утомлённый долгой дорогой</u>, <b>он</b> сразу уснул (обособляется перед определяемым личным местоимением)." },
            { id: "11", title: "Семантико-синтаксическое различие действительных и страдательных причастий", text: "Глубокое разграничение залоговых значений. Действительный залог указывает на активный субъект действия, страдательный — на объект, подвергающийся внешнему аккумулированному воздействию.", ex: "Анализ: Нападающий игрок (активное действие) — атакуемые позиции (пассивный объект воздействия)." },
            { id: "12", title: "Образование действительных причастий настоящего времени. Орфоэпический контроль", text: "Морфемный анализ. Суффиксы <strong>-УЩ- / -ЮЩ-</strong> (I спряжение) и <strong>-АЩ- / -ЯЩ-</strong> (II спряжение) образуются строго от основ настоящего времени переходных и непереходных глаголов. Отработка ударений.", ex: "Важно: Клеить (II спр.) -> кле<b>ящ</b>ий (ударение строго на Е). Стелить (I спр., искл.) -> стел<b>ющ</b>ий." },
            { id: "13", title: "Образование действительных причастий прошедшего времени. Исторические корни", text: "Образование с помощью суффиксов <strong>-ВШ- / -Ш-</strong> от основы инфинитива. Изучаются трудные случаи у глаголов с суффиксом -НУ- (исчезновение суффикса) и сохранение гласной инфинитива перед -ВШ-.", ex: "Пример: Раста<b>я</b>ть -> раста<b>я</b>вший, ла<b>я</b>ть -> ла<b>я</b>вший. Засохнуть -> засох<b>ш</b>ий (суффикс -ну- отпал)." },
            { id: "14", title: "Образование страдательных причастий настоящего времени. Редкие формы", text: "Суффиксы <strong>-ЕМ- / -ОМ-</strong> (I спр.) и <strong>-ИМ-</strong> (II спр.). Изучаются ограничения: страдательные причастия образуются только от переходных глаголов несовершенного вида. Анализ редких олимпийских форм.", ex: "Исключение: Глагол 'двигать' образует форму <i>движ<b>им</b>ый</i> (историческое влияние старославянского языка)." },
            { id: "15", title: "Образование страдательных причастий прошедшего времени. Отсечение гласных", text: "Морфемные трансформации при помощи суффиксов <strong>-НН-, -ЕНН-, -Т-</strong>. На углублённом уровне разбирается отсечение гласной основы инфинитива *-и-* при переходе в суффикс *-енн-*.", ex: "Схема: Обид<b>е</b>ть -> обид<b>е</b>нный (Е сохраняется). Постро<b>ить</b> -> постро<b>енн</b>ый (И отсекается, пишется ЕНН)." },
            { id: "16", title: "Краткие страдательные причастия. Трансформация синтаксической роли", text: "Анализ перехода полных форм в краткие. Краткие формы теряют способность склоняться по падежам, приобретают категорию рода и числа и трансформируются в предикат — составное именное сказуемое.", ex: "Пример: Территория была <i>оцеплена</i>. Оцеплена — краткое причастие, выполняющее роль сказуемого." },
            { id: "17", title: "Дифференциация полных причастий и отглагольных прилагательных (Н и НН)", text: "Главная ловушка экзаменов. Изучается процесс <strong>адъективации</strong> (переход причастия в прилагательное при потере значения времени). Формирование четырех условий для написания двух букв НН.", ex: "Сравнение: Жаренная <u>на сковороде</u> рыба (прич., есть зависимое слово -> НН) — Жареная рыба (отглагольное прил. -> Н)." },
            { id: "18", title: "Орфографический стандарт написания Н в кратких причастиях", text: "В отличие от кратких отглагольных прилагательных (где пишется столько же Н, сколько в полных), в кратких страдательных причастиях пишется строго <strong>одна буква Н</strong> во всех родах и числах.", ex: "Ловушка: Девочка воспита<b>нн</b>а и умна (кратк. прил. -> НН). — Дочь была воспита<b>н</b>а бабушкой (кратк. прич., есть субъект -> Н)." },
            { id: "19", title: "Разграничение слитного и раздельного написания НЕ с причастиями", text: "Комплексный орфографический анализ. Раздельное написание при наличии зависимых слов (причастный оборот), противопоставления с союзом А или усилительных слов. Слитное — при их отсутствии.", ex: "Раздельно: Ещё не_скошенная трава, далеко не_решённый вопрос. Слитно: Нескошенная трава." },
            { id: "20", title: "Орфограмма Ё-О после шипящих в глагольных и причастных суффиксах", text: "Жёсткое правило орфографии: в суффиксах и окончаниях любых слов, образованных от глагола (включая причастия), после шипящих под ударением пишется исключительно буква <strong>Ё</strong>.", ex: "Пример: Тушить -> туш<b>ённ</b>ый, туш<b>ён</b>ка; прекратить -> прекращ<b>ённ</b>ый, прекращ<b>ен</b>." }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
