<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 1. О языке и речи (PRO) — 7 класс Разумовская</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; text-align: center; margin-bottom: 5px; font-size: 2.2rem; }
        .page-title { text-align: center; color: #7f8c8d; font-size: 1.1rem; margin-bottom: 35px; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; font-weight: bold; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 18px; border-radius: 8px; margin-bottom: 12px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .topic-name { font-size: 1.05rem; font-weight: bold; color: #333; }
        
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
        .btn-toggle:hover { background: #1f618d; }
        
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="rus7_program.html?author=razumovskaya" class="back-link">← Назад к выбору глав</a>
        <h1>Глава 1. О языке, речи и речевом общении</h1>
        <div class="page-title">ПРОДВИНУТЫЙ АНАЛИЗ И ТЕОРИЯ (УГЛУБЛЁННЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>
    <script>
        const chapterData = [
            { id: "1", title: "Язык как развивающаяся система. Продвинутый неодинамический анализ", text: "<strong>Язык</strong> на углублённом уровне исследуется как динамическая система кодов. Развитие проявляется в процессах <i>архаизации</i> (уход слов в историзмы/архаизмы) и <i>неологизации</i>. Рассматриваются заимствования, адаптированные под фонетические законы русского языка.", ex: "Анализ: Процесс вытеснения исконных слов (зодчий -> архитектор -> строитель) отражает смену культурных эпох." },
            { id: "2", title: "Формы существования языка. Литературные нормы и их нарушения", text: "Высшая форма — <strong>литературный язык</strong>. Глубоко изучаются типы языковых норм: орфоэпические, лексические, грамматические. Нарушения норм порождают просторечия и интерференцию, недопустимые в кодифицированной речи.", ex: "Пример: Смешение паронимов (<i>одеть/надеть</i>) или неверное формообразование (<i>ихний, ложить</i>) — грубые отступления от литературной нормы." },
            { id: "3", title: "Сложные аспекты речевого этикета и прагматика общения", text: "Речевой этикет анализируется с точки зрения <strong>лингвистической прагматики</strong>. Учитываются скрытые интенции говорящего, стратегии речевого воздействия (убеждение, внушение) и тактики вежливого отказа в официальной коммуникации.", ex: "Правило: Использование косвенных речевых актов ('Не могли бы вы передать...') вместо прямых приказов повышает статус речевой культуры." }
        ];
        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `<div class="topic-card"><div class="topic-header"><div class="topic-name">Параграф ${t.id}. ${t.title}</div><button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button></div><div class="topic-details"><p>${t.text}</p><div class="example">${t.ex}</div></div></div>`;
        });
        function toggleTopic(button) {
            const d = button.closest('.topic-card').querySelector('.topic-details');
            if (d.style.display === 'block') { d.style.display = 'none'; button.innerText = 'Развернуть'; }
            else { d.style.display = 'block'; button.innerText = 'Свернуть'; }
        }
    </script>
</body>
</html>
