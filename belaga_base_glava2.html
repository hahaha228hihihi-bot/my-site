<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Базовый уровень — Глава 2</title>
    <style>
        /* Стили полностью аналогичны первой главе */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #27ae60; margin-bottom: 20px; font-size: 1.8rem; border-bottom: 2px solid #d5f5e3; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #27ae60; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #fdfefe; border: 1px solid #d5f5e3; border-left: 6px solid #2ecc71; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #2c3e50; }
        .btn-toggle { background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #218c53; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d5f5e3; line-height: 1.6; color: #444; }
        .example { background: #e8f8f5; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #27ae60; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к списку глав</a>
        <h1>Глава 2. Пространство, время и движение (Базовый уровень)</h1>
        <div id="topics-root"></div>
    </div>

    <script>
        const data = [
            { num: "7-8", name: "Механическое движение. Траектория, путь и перемещение", text: "Механическое движение — это когда тело меняет свое место относительно других тел со временем. Линия, вдоль которой двигалось тело, называется траекторией. Длина этой линии — это пройденный путь (s). А стрелка, соединяющая начальную и конечную точку движения, называется перемещением.", ex: "Пример: Если вы пробежали круг по стадиону, ваш путь равен длине дорожки, а перемещение равно нулю, так как вы вернулись на старт." },
            { num: "9-10", name: "Равномерное и неравномерное движение. Скорость", text: "Если тело за любые равные кусочки времени проходит одинаковое расстояние, движение называют равномерным. Если скорость меняется — неравномерным. Скорость (v) показывает, какой путь проходит тело за единицу времени. При неравномерном движении считают среднюю скорость — весь путь делят на все потраченное время.", ex: "Формула: v = s / t. Если машина проехала 100 км за 2 часа, её средняя скорость v = 100 / 2 = 50 км/ч." },
            { num: "11-12", name: "Явление инерции. Взаимодействие тел. Масса", text: "Инерция — это свойство тела сохранять свою скорость, пока на него никто не действует. Масса (m) показывает, насколько тело лениво (инертно) к изменению своей скорости. Тело с большой массой труднее разогнать или остановить.", ex: "Пример: Спотыкаясь, человек падает вперед, потому что его ноги остановились, а туловище продолжает двигаться по инерции." },
            { num: "13", name: "Плотность вещества", text: "Плотность показывает, какая масса вещества помещается в определенном объеме (например, в одном кубическом метре). У каждого вещества своя плотность. Например, плотность железа гораздо больше плотности дерева.", ex: "Формула: Плотность = Масса / Объём (ρ = m / V). Измеряется в кг/м³." }
        ];

        const container = document.getElementById('topics-root');
        data.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграфы ${t.num}. ${t.name}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
