<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotlight 7 — Грамматика (Базовый уровень)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #fcf9f5; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #27ae60; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d5f5e3; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2ecc71; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        
        .topic-card { background: #fffcf9; border: 1px solid #d5f5e3; border-left: 6px solid #2cc36b; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        
        .btn-toggle { background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #218c53; }
        
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d5f5e3; line-height: 1.6; color: #444; }
        .example { background: #e8f8f5; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #27ae60; color: #218c4e; }
    </style>
</head>
<body>
    <div class="container">
        <a href="eng7_2.html?book=spotlight" class="back-link">← Назад к выбору программы</a>
        <h1>Spotlight 7 класс</h1>
        <div class="page-title">ГРАММАТИКА И ТЕОРИЯ (БАЗОВЫЙ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const grammarData = [
            { id: "1", title: "Модуль 1: Present Simple vs Present Continuous", text: "Present Simple используется для регулярных действий, фактов и расписаний (маркеры: always, usually, every day). Present Continuous описывает действие, происходящее прямо сейчас (маркеры: now, at the moment). Глаголы состояния (Stative Verbs) в Continuous не употребляются.", ex: "Simple: I play football every Tuesday. / Continuous: Look! He is playing football now." },
            { id: "2", title: "Модуль 2: Past Simple (Прошедшее простое время)", text: "Используется для завершенных действий в прошлом, когда известно точное время (маркеры: yesterday, last year, ago). Правильные глаголы получают окончание -ed, неправильные берутся из второй колонки таблицы.", ex: "Пример: We watched a great film yesterday. She went to Paris last summer." },
            { id: "3", title: "Модуль 3: Степени сравнения прилагательных (Degrees of Comparison)", text: "Короткие прилагательные образуют сравнительную степень с суффиксом -er, превосходную — -est. Длинные слова требуют слов more и most. Перед превосходной степенью всегда ставится артикль 'the'.", ex: "Пример: Fast - faster - the fastest. Interesting - more interesting - the most interesting. Исключение: good - better - the best." },
            { id: "4", title: "Модуль 4: Прошедшее длительное время (Past Continuous)", text: "Описывает длительный процесс, который происходил в определенный момент в прошлом (например, вчера в 5 часов) или служил фоном для другого короткого действия в Past Simple.", ex: "Формула: was/were + V-ing. Пример: I was sleeping at 10 PM yesterday. / I was reading when she called." },
            { id: "5", title: "Модуль 5: Будущее время (Future Simple & To be going to)", text: "Future Simple (will + V) используется для спонтанных решений, прогнозов на будущее и обещаний. Конструкция 'to be going to' выражает четкие намерения, планы или очевидные события.", ex: "Will: I think it will rain tomorrow. / Going to: I am going to buy a new laptop next week." },
            { id: "6", title: "Модуль 6: Настоящее совершенное время (Present Perfect)", text: "Выражает действие, которое уже завершилось к настоящему моменту, но нам важен его результат прямо сейчас. Точное время действия никогда не указывается. Маркеры: already, yet, just, ever, never.", ex: "Формула: have/has + V3. Пример: I have already cleanеd my room (комната чистая). / Have you ever been to London?" },
            { id: "7", title: "Модуль 7: Модальные глаголы (Must, Have to, Should)", text: "Must выражает строгую личную обязанность или приказ. Have to означает вынужденное действие из-за внешних правил или законов. Should используется для мягкого совета.", ex: "Пример: You must do your homework. / I have to wear a school uniform. / You should sleep more." },
            { id: "8", title: "Модуль 8: Косвенная речь (Introductory Verbs: Say, Tell)", text: "Глагол 'Say' используется, если после него не указано лицо, к которому обращаются. Глагол 'Tell' требует обязательного указания адресата действия.", ex: "Say: He said that he was tired. / Tell: He told ME that he was tired." },
            { id: "9", title: "Модуль 9: Местоимения количества (Much, Many, A lot of, Little, Few)", text: "Many и few используются с исчисляемыми существительными. Much и little — с неисчисляемыми. A lot of универсален и чаще всего пишется в утвердительных предложениях.", ex: "Пример: I have many books and a lot of free time. There is very little water left." },
            { id: "10", title: "Модуль 10: Возвратные местоимения (Reflexive Pronouns)", text: "Указывают на то, что действие субъекта направлено на самого себя. Переводятся как 'себя', 'сам', 'самостоятельно'. Образуются при помощи суффиксов -self / -selves.", ex: "Пример: I cut myself (Я порезался). / She did the homework by herself (Она сделала её сама)." }
        ];

        const container = document.getElementById('topics-root');
        grammarData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
