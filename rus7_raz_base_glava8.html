<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 8. Предлог — 7 класс Разумовская</title>
    <style>
        /* Стили полностью идентичны */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #fcf9f5; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #27ae60; text-align: center; margin-bottom: 5px; font-size: 2.2rem; }
        .page-title { text-align: center; color: #7f8c8d; font-size: 1.1rem; margin-bottom: 35px; border-bottom: 2px solid #d5f5e3; padding-bottom: 10px; font-weight: bold; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2ecc71; text-decoration: none; font-weight: bold; }
        .topic-card { background: #fffcf9; border: 1px solid #d5f5e3; border-left: 6px solid #2cc36b; padding: 18px; border-radius: 8px; margin-bottom: 12px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .topic-name { font-size: 1.05rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #27ae60; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d5f5e3; line-height: 1.6; color: #444; }
        .example { background: #e8f8f5; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #27ae60; color: #218c4e; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="rus7_program.html?author=razumovskaya" class="back-link">← Назад к выбору глав</a>
        <h1>Глава 8. Служебные слова. Предлог</h1>
        <div class="page-title">ПО ОРИГИНАЛЬНОМУ ОГЛАВЛЕНИЮ М. М. РАЗУМОВСКОЙ</div>
        <div id="topics-root"></div>
    </div>
    <script>
        const chapterData = [
            { id: "41", title: "Предлог как служебная часть речи", text: "<strong>Предлог</strong> выражает зависимость существительных, числительных и местоимений от других слов в словосочетании и предложении. Предлоги не имеют лексического значения и не являются самостоятельными членами предложения.", ex: "Пример: Войти <i>в</i> дом, говорить <i>с</i> учителем, подарок <i>для</i> сестры." },
            { id: "42", title: "Непроизводные и производные предлоги", text: "<strong>Непроизводные</strong> изначально возникли как предлоги (<i>в, на, с, у, к</i>). <strong>Производные предлоги</strong> образовались путём перехода слов из самостоятельных частей речи: существительных (<i>ввиду</i>), наречий (<i>вокруг</i>) или деепричастий (<i>благодаря</i>).", ex: "Сравнение: Обойти <i>вокруг</i> озера (производный предлог) — Посмотри <i>вокруг</i> (наречие)." },
            { id: "43", title: "Простые и составные предлоги", text: "По строению предлоги делятся на <strong>простые</strong> (состоят из одного слова: <i>в, под, перед, благодаря</i>) и <strong>составные</strong> (состоят из нескольких слов: <i>в течение, в продолжение, несмотря на</i>).", ex: "Простые: из-за, над, согласно. Составные: в связи с, по направлению к." },
            { id: "44", title: "Слитное и раздельное написание производных предлогов", text: "Предлоги <strong>ввиду, вследствие, вроде, вместо, наподобие, внутри</strong> пишутся слитно. Предлоги <strong>в течение, в продолжение, в продолжении, в силу, в целях, в связи с</strong> пишутся раздельно. <br>Важно: предлоги <i>в течение</i> и <i>в продолжение</i> имеют на конце букву <strong>Е</strong>.", ex: "Пример: <i>В течение</i> часа (время). / Ошибки в работе возникли <i>вследствие</i> (причина = из-за) невнимательности." },
            { id: "45", title: "Морфологический разбор предлога", text: "Порядок разбора: 1) Часть речи; 2) Простой или составной; 3) Производный или непроизводный; 4) С каким падежом какого слова употреблён; 5) Какое значение выражает (временное, причинное, пространственное).", ex: "Схема: 'Работать <i>в течение</i> месяца'. В течение — предлог, составной, производный, с Р.п., значение времени." },
            { id: "46", title: "Культура речи. Правильное употребление предлогов с падежами", text: "Производные предлоги <strong>БЛАГОДАРЯ, СОГЛАСНО, ВОПРЕКИ, НАПЕРЕКОР</strong> по нормам литературного языка требуют после себя существительного строго в <strong>Дательном падеже</strong> (кому? чему?). Использование Родительного падежа — грубая ошибка.", ex: "Правильно: <i>Согласно приказу</i> (не приказа!), <i>вопреки прогнозу</i>, <i>благодаря совету</i>." }
        ];
        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `<div class="topic-card"><div class="topic-header"><div class="topic-name">Параграф ${t.id}. ${t.title}</div><button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button></div><div class="topic-details"><p>${t.text}</p><div class="example">${t.ex}</div></div></div>`;
        });
        function toggleTopic(button) {
            const d = button.closest('.topic-card').querySelector('.topic-details');
            if (d.style.display === 'block') { d.style.display = 'none'; button.innerText = 'Развернуть'; }
            else { d.style.display = 'block'; button.innerText = 'Свернуть'; }
        }
    </script>
</body>
</html>
