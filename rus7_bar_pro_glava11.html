<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 11. Активные процессы синтаксиса — Русский язык 7 glass</title>
    <style>
        /* Стили идентичны */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #1f618d; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 11. Активные процессы в синтаксисе</h1>
        <div class="page-title">СИНТАКСИЧЕСКИЕ ТРЕНДЫ И ПАРЦЕЛЛЯЦИЯ (УГЛУБЛЁННЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { id: "1", title: "Парцелляция как экспрессивный синтаксический приём", text: "<strong>Парцелляция</strong> — это намеренное расчленение связной грамматической структуры предложения на несколько изолированных фрагментов, отделяемых точками. Применяется в публицистике и художественной литературе для создания интонационной паузы и выделения ключевых деталей.", ex: "Пример: Он ушёл в ночь. <i>Насовсем. Без вещей. Не прощаясь.</i> (Обстоятельства превращены в отдельные предложения)." },
            { id: "2", title: "Сегментация предложения (Именительный темы)", text: "<strong>Сегментация</strong> — это выделение важного понятия в самое начало предложения в виде изолированного Именительного падежа (именительного темы), после которого ставится двоеточие или тире, а затем идёт основная мысль, дублирующая это понятие через местоимение.", ex: "Пример: <i>Москва...</i> Как много в этом звуке для сердца русского слилось! / <i>Компьютерные игры — они</i> затягивают мгновенно." },
            { id: "3", title: "Рост аналитизма и популярность бессоюзных конструкций (БСП)", text: "В современном синтаксисе наблюдается отказ от громоздких сложноподчинённых предложений (СПП) с обилием союзов в пользу динамичных <strong>бессоюзных сложных предложений (БСП)</strong>. Смысловые связи (причина, следствие, условие) в них выражаются не союзами, а интонацией и знаками препинания (двоеточие, тире).", ex: "Вместо СПП: Я не пришёл, <i>потому что</i> заболел. -> БСП: Я не пришёл: заболел (двоеточие заменяет союз 'потому что')." },
            { id: "4", title: "Инверсия и её стилистические функции", text: "<strong>Инверсия</strong> — изменение прямого (привычного) порядка слов в предложении для логического и эмоционального выделения конкретного слова. В русском языке прямой порядок: подлежащее перед сказуемым, определение перед существительным.", ex: "Прямой: Тоскливые зимние вечера тянулись долго. / Инверсия: <i>Долго и мучительно тянулись тоскливые зимние вечера</i> (выделено обстоятельство)." },
            { id: "5", title: "Синтаксическая синонимия предложений и оборотов", text: "На углублённом уровне изучаются возможности замены одних синтаксических конструкций другими без потери общего смысла. Сюда относится замена придаточных частей сложноподчинённого предложения (СПП) на <strong>причастные и деепричастные обороты</strong>.", ex: "Замена: Мальчик, <i>который прочитал книгу</i>, вернул её в библиотеку. -> Мальчик, <u>прочитавший книгу</u>, вернул её в библиотеку." }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
