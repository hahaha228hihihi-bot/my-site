<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 1. Русский язык как развивающееся явление — 7 класс</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #fcf9f5; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #27ae60; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d5f5e3; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2ecc71; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        
        .topic-card { background: #fffcf9; border: 1px solid #d5f5e3; border-left: 6px solid #2cc36b; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        
        .btn-toggle { background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #218c53; }
        
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d5f5e3; line-height: 1.6; color: #444; }
        .example { background: #e8f8f5; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #27ae60; color: #218c4e; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 1. Русский язык как развивающееся явление</h1>
        <div class="page-title">ПОЛНАЯ ТЕОРИЯ И ПАРАГРАФЫ (БАЗОВЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { 
                id: "1", 
                title: "Язык как развивающееся явление. Изменения в лексике", 
                text: "<strong>Русский язык</strong> не является застывшим, он непрерывно развивается вместе с обществом. Быстрее всего изменения происходят в его <strong>лексике</strong> (словарном запасе). С появлением новых предметов, технологий и явлений в языке рождаются новые слова — <strong>неологизмы</strong>. Одновременно с этим старые слова, которыми люди перестают пользоваться, постепенно уходят из активного употребления и становятся <strong>устаревшими</strong>.", 
                ex: "Пример неологизмов: смартфон, нейросеть, блогер. Пример устаревших слов: кафтан, очи (глаза), конка." 
            },
            { 
                id: "2", 
                title: "Устаревшие слова: Историзмы и Архаизмы", 
                text: "Все устаревшие слова делятся на две большие группы. <strong>Историзмы</strong> — это названия предметов и понятий, которые совсем исчезли из нашей жизни (у них нет современных синонимов). <strong>Архаизмы</strong> — это старые названия современных предметов и понятий, которые в современном языке были вытеснены новыми, более привычными словами-синонимами.", 
                ex: "Историзмы: боярин, вече, оброк, стрельцы. / Архаизмы: ланиты (щеки), перст (палец), глаголать (говорить), град (город)." 
            },
            { 
                id: "3", 
                title: "Заимствованные слова и их роль в языке", 
                text: "Язык развивается не только за счёт внутренних ресурсов, но и благодаря контактам с другими народами. Так в русском языке появляются <strong>заимствованные слова</strong>. В разные исторические эпохи к нам приходили слова из греческого, латинского, немецкого, французского, а в наше время — из английского языка. Заимствования обогащают язык, но их чрезмерное использование без необходимости может засорять речь.", 
                ex: "Из греческого: ангел, свёкла, тетрадь. Из французского: пальто, жалюзи, бульон. Из английского: компьютер, матч, стартап." 
            },
            { 
                id: "4", 
                title: "Изменения в фонетике и грамматике языка", 
                text: "Изменения в звуковом строе (<strong>фонетике</strong>) и правилах образования слов (<strong>грамматике</strong>) тоже происходят, но они занимают столетия и почти незаметны в течение одной человеческой жизни. Например, меняются нормы ударения в словах, произношение отдельных звуков, а также могут исчезать или упрощаться целые грамматические формы (например, в древнерусском языке помимо единственного и множественного числа существовало ещё и двойственное число).", 
                ex: "Смена ударения: раньше говорили 'поезда́', теперь норма — 'по́езда'. Изменение произношения: слово 'булочная' старое поколение произносило как [булошная]." 
            }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
