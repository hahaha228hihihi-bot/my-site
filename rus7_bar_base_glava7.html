<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 7. Категория состояния — Русский язык 7 класс</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #fcf9f5; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #27ae60; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d5f5e3; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2ecc71; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        
        .topic-card { background: #fffcf9; border: 1px solid #d5f5e3; border-left: 6px solid #2cc36b; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        
        .btn-toggle { background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #218c53; }
        
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d5f5e3; line-height: 1.6; color: #444; }
        .example { background: #e8f8f5; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #27ae60; color: #218c4e; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 7. Категория состояния</h1>
        <div class="page-title">ПОЛНЫЙ КУРС, СЕМАНТИКА И СИНТАКСИС (БАЗОВЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { 
                id: "1", 
                title: "Понятие о категории состояния. Грамматические признаки", 
                text: "<strong>Категория состояния</strong> (или слова категории состояния — СКС) — это самостоятельная часть речи, которая обозначает состояние природы, окружающей среды, физическое или душевное состояние человека. <br><strong>Ключевые свойства:</strong> <br>1) Отвечает на вопросы: <i>как? каково?</i>; <br>2) Является <strong>неизменяемой</strong> частью речи (не имеет окончаний); <br>3) Употребляется только в особых <strong>безличных предложениях</strong> (где нет и не может быть подлежащего) в роли главного члена — <strong>сказуемого</strong>.", 
                ex: "Пример: В комнате было <i>душно</i>. Нам стало <i>грустно</i>. В этих предложениях слова 'душно' и 'грустно' — это сказуемые, выражающие состояние." 
            },
            { 
                id: "2", 
                title: "Основные разряды слов категории состояния по значению", 
                text: "Все слова категории состояния делятся на несколько основных смысловых групп: <br>1) <strong>Состояние окружающей среды и природы:</strong> <i>холодно, ветрено, светло, морозно</i>; <br>2) <strong>Физическое состояние живых существ:</strong> <i>больно, дурно, тошно, тяжело</i>; <br>3) <strong>Психическое (душевное) состояние человека:</strong> <i>весело, грустно, стыдно, страшно, боязно</i>; <br>4) <strong>Оценка действий с точки зрения возможности/необходимости:</strong> <i>можно, нельзя, надо, пора, жаль</i>.", 
                ex: "Пример: На улице <i>тихо</i> (природа). Ему <i>больно</i> (физическое). Мне <i>жаль</i> расставаться (оценка/модальность)." 
            },
            { 
                id: "3", 
                title: "Главная ловушка: как отличить категорию состояния от наречия и прилагательного", 
                text: "Многие слова категории состояния оканчиваются на <strong>-О / -Е</strong> и внешне абсолютно похожи на наречия или краткие средние прилагательные. Чтобы их различить, смотрим на их роль в предложении: <br>• <strong>Прилагательное</strong> относится к существительному и обозначает признак предмета (есть подлежащее); <br>• <strong>Наречие</strong> относится к глаголу и обозначает признак действия (отвечает на вопрос <i>как?</i>); <br>• <strong>Категория состояния</strong> ни к чему не относится, стоит в безличном предложении и само является сказуемым.", 
                ex: "Сравни: 1) Лицо дитяти <i>грустно</i> (прилагательное, признак лица). 2) Он <i>грустно</i> посмотрел на меня (наречил, посмотрел как? - грустно). 3) Мне <i>грустно</i> (категория состояния, безличное предложение)." 
            }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
