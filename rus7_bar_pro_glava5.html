<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 5. Омонимия частей речи — Русский язык 7 класс</title>
    <style>
        /* Стили идентичны */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #1f618d; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 5. Трудные случаи разграничения омонимичных слов</h1>
        <div class="page-title">АНАЛИЗ ГРАММАТИЧЕСКИХ ОМОНИМОВ (УГЛУБЛЁННЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { id: "1", title: "Омонимия производных предлогов и существительных с предлогами", text: "Производные предлоги (<i>ввиду, вследствие, в течение</i>) не отвечают на вопросы и заменяются другими предлогами. Омонимичные им существительные сохраняют предметное значение, к ним можно задать падежный вопрос и поставить между предлогом и словом определение.", ex: "Предлог: <i>Ввиду</i> (из-за) бури рейс отменили. / Существительное: Иметь <i>в виду</i>. В <i>следствие</i> по уголовному делу вмешались новые факты." },
            { id: "2", title: "Разграничение союзов ЧТОБЫ, ТОЖЕ, ТАКЖЕ, ЗАТО и созвучных сочетаний", text: "Союзы пишутся слитно, их можно заменить синонимичными союзами (тоже = также = и). В омонимичных раздельных сочетаниях местоимений или наречий с частицами (<i>что бы, то же, так же</i>) частицы 'бы' и 'же' можно выкинуть или переставить без потери смысла.", ex: "Союз: Я пришёл, <i>чтобы</i> помочь. / Сочетание: <i>Что бы</i> (что мне почитать бы?) мне почитать сегодня вечером?" },
            { id: "3", title: "Омонимия наречий и предложно-падежных форм имён существительных", text: "Наречия пишутся слитно и обозначают признак действия (<i>вначале, вглубь, сначала</i>). Существительные с непроизводными предлогами пишутся раздельно, имеют при себе зависимые слова (обычно прилагательные) или указывают на физическое пространство.", ex: "Наречие: <i>Вначале</i> выслушай меня. / Существительное: <i>В начале</i> (в самом начале) осени шли дожди. Уйти <i>в глубь</i> леса." },
            { id: "4", title: "Омонимия кратких прилагательных, кратких причастий и наречий на -О", text: "Сложнейший морфологический разбор. <strong>Прилагательное</strong> согласуется с подлежащим, пишется с НН. <strong>Причастие</strong> обозначает действие, имеет при себе дополнение в Т.п. и пишется с одной Н. <strong>Наречие / категория состояния</strong> неизменяемы.", ex: "Прил.: Море <i>взволнованно</i> (оно каково?). / Прич.: Общество было <i>взволновано</i> известием. / Наречие: Он <i>взволнованно</i> ходил по комнате." },
            { id: "5", title: "Омонимия частиц, союзов и вводных слов (И, ИМЕННО, ОДНАКО)", text: "Слова могут менять синтаксическую роль в зависимости от контекста. Например, слово <i>однако</i> является противительным союзом, если стоит в начале предложения (заменяется на 'но'). Если оно стоит в середине или конце и отделяется запятыми — это вводное слово.", ex: "Союз: <i>Однако</i> (но) мы продолжили путь. / Вводное слово: Погода, <i>однако</i>, резко испортилась." }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
