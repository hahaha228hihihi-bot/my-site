<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 1. Старославянский язык — Русский язык 7 класс</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #1f618d; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 1. Роль старославянского языка</h1>
        <div class="page-title">ИСТОРИЯ ЯЗЫКА И ЦЕРКОВНОСЛАВЯНИЗМЫ (УГЛУБЛЁННЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { id: "1", title: "Старославянский язык как первый литературный язык славян", text: "<strong>Старославянский язык</strong> — это древнейший письменный язык славян, созданный в IX веке братьями Кирилом и Мефодием на основе древнеболгарских говоров для перевода богослужебных книг. Он стал основой для формирования древнерусской и современной русской книжной культуры.", ex: "Исторический факт: До создания кириллицы у восточных славян не было развитой системы фиксации текстов высокой культуры." },
            { id: "2", title: "Фонетические признаки старославянизмов. Неполногласие", text: "Слова старославянского происхождения (старославянизмы) имеют чёткие звуковые приметы. Главный признак — <strong>неполногласие</strong>. Сочетаниям согласных <strong>-РА-, -ЛА-, -РЕ-, -ЛЕ-</strong> между согласными соответствуют исконно русские полногласные сочетания <strong>-ОРО-, -ОЛО-, -ЕРЕ-, -ЕЛО-</strong>.", ex: "Сравнение: град — город, злато — золото, брег — берег, млечный — молочный, влачить — волочить." },
            { id: "3", title: "Звуковые соответствия согласных звуков (ЖД и Щ)", text: "В старославянизмах на месте праславянских сочетаний согласных развились звуки <strong>ЖД</strong> и <strong>Щ</strong>. В исконно русских словах в этих же корнях и морфемах развились простые звуки <strong>Ж</strong> и <strong>Ч</strong>. Это важнейший маркер для лингвистического анализа.", ex: "Сравнение (Старославянизм / Русское): одежда — одёжа, вождь — вожак, освещение — свеча, пещера — печка." },
            { id: "4", title: "Морфологические приметы: приставки и суффиксы", text: "Старославянизмы легко узнать по приставкам <strong>воз- (вос-), из- (ис-), низ- (нис-), пред-, чрез-, пре-, со-</strong>. Также для них характерны суффиксы существительных <strong>-ствие, -знь, -ыня, -тва</strong> и суффиксы причастий <strong>-ущ-, -ющ-, -ащ-, -ящ-</strong>, которые вытеснили древнерусские суффиксы -уч-/-яч-.", ex: "Примеры: изгнать (рус. выгнать), чрезмерный, казнь, гордыня, молитва, летящий (рус. летучий), горящий (рус. горячий)." },
            { id: "5", title: "Стилистическая роль старославянизмов в современной речи", text: "В современном русском языке большинство старославянизмов утратили религиозный контекст, но сохранили <strong>высокую стилистическую окраску</strong>. Они используются в художественной и публицистической речи для придания торжественности, патетики или создания исторического колорита.", ex: "Пример: Использование слов 'длань' (вместо ладонь), 'уста' (вместо губы), 'воздвигнуть' (вместо построить) в поэзии." }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
