<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 3. Силы и основы динамики</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; margin-bottom: 20px; font-size: 1.8rem; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #fdfefe; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #2c3e50; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #1f618d; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к списку глав</a>
        <h1>Глава 3. Силы и основы динамики (Параграфы 14-28)</h1>
        <div id="topics-root"></div>
    </div>

    <script>
        const ch3Data = [
            { id: "14", title: "Сила как физическая величина", text: "Сила (F) — векторная величина, количественная мера взаимодействия тел. Результатом действия силы является изменение скорости тела (ускорение) или его деформация. Сила полностью задаётся тремя параметрами: модулем (численным значением), направлением вектора в пространстве и точкой приложения силы к телу.", ex: "Единица измерения: Ньютон (Н). 1 Н — сила, изменяющая скорость тела массой 1 кг на 1 м/с за 1 секунду." },
            { id: "15", title: "Явление тяготения. Сила тяжести", text: "Гравитационное взаимодействие — фундаментальное свойство материи, согласно которому любые два тела во Вселенной притягиваются друг к другу. Сила тяжести — частный случай гравитации, действующий на тела вблизи массивного астрономического объекта. Направлена строго вертикально вниз к геометрическому центру планеты.", ex: "Формула: F_тяж = m * g, где g — ускорение свободного падения (для Земли g ≈ 9.81 Н/кг)." },
            { id: "16-17", title: "Сила упругости. Закон Гука и устройство динамометра", text: "Сила упругости возникает при упругой деформации (сдвиге, растяжении, сжатии) тел вследствие изменения расстояния между межмолекулярными связями. Направлена противоположно деформирующему смещению. На законе Гука основана работа динамометров (приборов измерения силы): удлинение калиброванной пружины линейно связано с приложенной к ней нагрузкой.", ex: "Закон Гука: F_упр = -k * x, где k — жёсткость тела (Н/м), x — абсолютная деформация (м). Знак минус указывает на противоположное направление векторов силы и смещения." },
            { id: "18-19", title: "Вес тела. Невесомость и перегрузки", text: "Вес (P) — это сила, с которой тело действует на горизонтальную опору или вертикальный подвес вследствие гравитационного притяжения к Земле. В отличие от силы тяжести, приложенной к центру масс тела, вес приложен непосредственно к опоре/подвесу. Если опора движется с ускорением свободного падения g вместе с телом, то опора не испытывает деформации, и вес тела исчезает (P=0) — наступает невесомость. При ускорении вверх вес растёт (перегрузка).", ex: "Формула в покое: P = m * g. При ускорении вверх: P = m * (g + a). При ускорении вниз: P = m * (g - a)." },
            { id: "20-21", title: "Сложение сил. Равнодействующая сонаправленных и противоположных сил", text: "Если на материальную точку одновременно действуют несколько сил, их геометрическая (векторная) сумма называется равнодействующей силой. При сложении сил, действующих вдоль одной прямой в одном направлении, вектор равнодействующей сонаправлен им, а её модуль равен сумме модулей. При противоположных направлениях модуль равен разности модулей, а вектор направлен в сторону большей силы.", ex: "Сонаправленные силы: R = F1 + F2. Противоположные силы: R = |F1 - F2|." },
            { id: "22-26", title: "Сила трения (покоя, скольжения, качения). Трение в природе и технике", text: "Сила трения возникает в плоскости контакта соприкасающихся поверхностей и препятствует их относительному тангенциальному смещению. Причины трения — шероховатость поверхностей (зацепление микронеровностей) и межмолекулярное притяжение на идеально гладких участках. Трение покоя удерживает тела от проскальзывания и равно внешней сдвигающей силе. При превышении порога покоя тело начинает скользить. Трение качения возникает при перекатывании цилиндрических/шарообразных тел и значительно меньше трения скольжения.", ex: "Формула трения скольжения: F_тр = μ * N, где μ — безразмерный коэффициент трения, N — сила нормальной реакции опоры. Для уменьшения трения в механизмах скольжение заменяют качением (подшипники) и вводят смазочные материалы." },
            { id: "27-28", title: "Сопротивление среды в жидкостях и газах. Итоги динамики", text: "В отличие от сухого трения, в жидких и газообразных средах полностью отсутствует трение покоя — тело приводится в движение сколь угодно малой силой. Сила сопротивления среды зависит от вязкости среды, геометрии (миделева сечения) тела и нелинейно растет с увеличением его скорости. На малых скоростях F ~ v, на сверхзвуковых F ~ v². Итог динамики: изменение кинематического состояния тела (вектора скорости) всегда обусловлено ненулевой равнодействующей внешних взаимодействий.", ex: "Пример: Ламинарное обтекание снижает сопротивление воздуха, поэтому гоночным болидам и ракетам придают строго каплевидную, аэродинамическую форму." }
        ];

        const container = document.getElementById('topics-root');
        ch3Data.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграфы ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
