<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 12. Итоговое обобщение — Русский язык 7 класс</title>
    <style>
        /* Стили идентичны */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; }
        .topic-name { font-size: 1.1rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle:hover { background: #1f618d; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
        strong { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Назад к выбору программы</a>
        <h1>Глава 12. Итоговое обобщение курса</h1>
        <div class="page-title">СИСТЕМАТИЗАЦИЯ И ЛИНГВИСТИЧЕСКИЕ ИТОГИ (УГЛУБЛЁННЫЙ УРОВЕНЬ)</div>

        <div id="topics-root"></div>
    </div>

    <script>
        const chapterData = [
            { id: "1", title: "Систематизация орфографических норм повышенной сложности", text: "Обобщение ключевых орфограмм 7 класса: правописание <strong>Н и НН</strong> во всех частях речи, слитное/раздельное написание <strong>НЕ и НЕ</strong> с причастиями, деепричастиями и наречиями, а также правописание сложных производных предлогов и союзов.", ex: "Контроль: Свежезамороже<strong>нн</strong>ые овощи, работа не_выполнена, вследствие непогоды, то же самое." },
            { id: "2", title: "Продвинутый пунктуационный анализ конструкций", text: "Повторение правил обособления второстепенных членов предложения. Анализ знаков препинания в причастных и деепричастных оборотах, обособление уточняющих обстоятельств, а также знаки препинания в сложных предложениях с бессоюзной и подчинительной связью.", ex: "Пример структуры: <u>Увидев друга</u> (дееприч. об.), я закричал, и он, <u>стоявший на остановке</u> (прич. об.), оглянулся." },
            { id: "3", title: "Исторические законы как основа современной орфографии", text: "Итоговое понимание того, что русское правописание логично. Все современные чередования согласных (<i>палатализация</i>) и появление беглых гласных уходят корнями в <strong>падение редуцированных гласных Ъ и Ь</strong> в древнерусском языке.", ex: "Вывод: Историческая грамматика доказывает, что в языке нет случайных исключений, у каждого правила есть древний закон." },
            { id: "4", title: "Морфологический анализ переходных явлений", text: "Итоговое обобщение трудных случаев разбора слов. Закрепление навыка определения слов, сменивших свою часть речи: <strong>субстантивация</strong> (прилагательные в роли существующих), <strong>адъективация</strong> (причастия в роли прилагательных) и переход наречий в предлоги.", ex: "Разбор: Слово 'столовая' (в предложении 'я зашёл в столовую') разбирается строго как имя существительное, а не прилагательное." },
            { id: "5", title: "Комплексный филологический анализ текста", text: "Высшая точка углубленного курса — умение соединить воедино определение темы, микротем, функционального стиля текста, его синтаксических особенностей (инверсия, парцелляция) и лексических средств выразительности (тропов).", ex: "Итог: Полная готовность к лингвистическим олимпиадам, исследовательским проектам и успешной сдаче экзаменов." }
        ];

        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `
                <div class="topic-card">
                    <div class="topic-header">
                        <div class="topic-name">Параграф ${t.id}. ${t.title}</div>
                        <button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button>
                    </div>
                    <div class="topic-details">
                        <p>${t.text}</p>
                        <div class="example">${t.ex}</div>
                    </div>
                </div>`;
        });

        function toggleTopic(button) {
            const card = button.closest('.topic-card');
            const details = card.querySelector('.topic-details');
            if (details.style.display === 'block') {
                details.style.display = 'none';
                button.innerText = 'Развернуть';
            } else {
                details.style.display = 'block';
                button.innerText = 'Свернуть';
            }
        }
    </script>
</body>
</html>
