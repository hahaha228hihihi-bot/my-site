<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математика 5 класс — Список глав</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #faf4f4; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        /* КРАСНЫЙ СТИЛЬ СРЕДНЕЙ ШКОЛЫ */
        h1 { color: #c0392b; margin-bottom: 5px; font-size: 2.2rem; text-align: center; }
        .page-title { text-align: center; color: #7f8c8d; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 35px; font-weight: bold; border-bottom: 2px solid #f9d5d2; padding-bottom: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #e74c3c; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        .section-header { font-size: 1.3rem; font-weight: bold; color: #333; margin-bottom: 20px; text-align: center; }
        
        .chapters-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 15px; }
        .chapter-link { display: block; background: #fff8f8; padding: 18px; border-radius: 10px; text-decoration: none; font-size: 1.1rem; font-weight: bold; transition: all 0.2s; border: 2px solid #ff8282; border-left: 8px solid #e74c3c; color: #c0392b; }
        
        /* При наведении карточка полностью заливается красным, а текст гарантированно БЕЛЫЙ */
        .chapter-link:hover { transform: translateX(5px); background: #e74c3c; color: #ffffff !important; }
        .not-ready { text-align: center; color: #7f8c8d; font-style: italic; padding: 20px; width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <a href="math5.html" class="back-link">← Вернуться к выбору автора</a>
        <h1 id="mainTitle">Математика 5 класс</h1>
        <div class="page-title">ДОСТУПНЫЕ УЧЕБНЫЕ ГЛАВЫ</div>

        <div class="section-header" id="panelTitle">Выберите главу для изучения:</div>
        
        <div class="chapters-grid" id="chaptersGrid"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const author = urlParams.get('author');
        const grid = document.getElementById('chaptersGrid');
        
        if(author === 'vilenkin') {
            document.getElementById('mainTitle').innerText = "Математика — Н. Я. Виленкин";
            grid.innerHTML = `
                <a href="math5_v_glava1.html" class="chapter-link">🔻 Глава 1. Натуральные числа и нумерация</a>
                <a href="#" onclick="alert('Этот раздел в разработке!')" class="chapter-link">🔻 Глава 2. Сложение и вычитание натуральных чисел</a>
                <a href="#" onclick="alert('Этот раздел в разработке!')" class="chapter-link">🔻 Глава 3. Умножение и деление натуральных чисел</a>
                <a href="#" onclick="alert('Этот раздел в разработке!')" class="chapter-link">🔻 Глава 4. Площади и объёмы фигур</a>
                <a href="#" onclick="alert('Этот раздел в разработке!')" class="chapter-link">🔻 Глава 5. Обыкновенные дроби</a>
                <a href="#" onclick="alert('Этот раздел в разработке!')" class="chapter-link">🔻 Глава 6. Десятичные дроби. Проценты</a>
            `;
        } else if(author === 'merzlyak') {
            document.getElementById('mainTitle').innerText = "Математика — А. Г. Мерзляк";
            grid.innerHTML = `
                <div class="not-ready">🔒 Главы учебника Мерзляка находятся в наполнении и появятся совсем скоро!</div>
            `;
        }
    </script>
</body>
</html>
