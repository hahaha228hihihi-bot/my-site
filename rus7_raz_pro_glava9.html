<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава 9. Союз (PRO) — 7 класс Разумовская</title>
    <style>
        /* Стили полностью идентичны */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f2f7fa; color: #333; padding-bottom: 60px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #1f618d; text-align: center; margin-bottom: 5px; font-size: 2.2rem; }
        .page-title { text-align: center; color: #7f8c8d; font-size: 1.1rem; margin-bottom: 35px; border-bottom: 2px solid #d4e6f1; padding-bottom: 10px; font-weight: bold; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-weight: bold; }
        .topic-card { background: #f4f9fc; border: 1px solid #d4e6f1; border-left: 6px solid #3498db; padding: 18px; border-radius: 8px; margin-bottom: 12px; }
        .topic-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .topic-name { font-size: 1.05rem; font-weight: bold; color: #333; }
        .btn-toggle { background: #2980b9; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .topic-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #d4e6f1; line-height: 1.6; color: #444; }
        .example { background: #ebf5fb; padding: 10px; border-radius: 5px; margin-top: 8px; font-style: italic; border-left: 3px solid #2980b9; color: #1f618d; }
    </style>
</head>
<body>
    <div class="container">
        <a href="rus7_program.html?author=razumovskaya" class="back-link">← Назад к выбору глав</a>
        <h1>Глава 9. Служебные слова. Союз</h1>
        <div class="page-title">ПО ОРИГИНАЛЬНОМУ ОГЛАВЛЕНИЮ М. М. РАЗУМОВСКОЙ (PRO)</div>
        <div id="topics-root"></div>
    </div>
    <script>
        const chapterData = [
            { id: "47", title: "Союз как служебная часть речи. Синтаксические функции", text: "<strong>Союз</strong> — это служебный коннектор, связывающий между собой однородные компоненты простого предложения либо предикативные части сложного. По морфемной структуре делятся на простые и составные.", ex: "Простые: и, а, но, чтобы, если. Составные: в силу того что, благодаря тому что." },
            { id: "48", title: "Сочинительные союзы. Семантико-синтаксическая классификация", text: "Связывают абсолютно равноправные элементы (однородные члены или части ССП). На PRO-уровне изучаются грамматические разряды: соединительные, противительные, разделительные, а также градационные (<i>не только... но и</i>) и присоединительные (<i>тоже, также</i>).", ex: "Пример: Он <i>не только</i> выполнил норму, <i>но и</i> перевыполнил её (градационный сочинительный союз)." },
            { id: "49", title: "Подчинительные союзы. Разряды и союзные слова", text: "Связывают части сложноподчинённого предложения (СПП). Глубоко исследуется разница между <strong>подчинительными союзами</strong> (не являются членами предложения: <i>что, чтобы, если</i>) и <strong>союзными словами</strong> (местоимения и наречия, выступающие членами предложения: <i>который, где, куда</i>).", ex: "Союз: Мы знаем, <i>что</i> (союз) наступит осень. Союзное слово: Мы увидели дом, <i>который</i> (подлежащее) стоял у реки." },
            { id: "50", title: "Слитное правописание союзов Чтобы, Также, Тоже, Зато. Анализ омонимии", text: "Важнейшая ловушка синтаксиса и орфографии. Союзы пишутся слитно и заменяются синонимами (тоже = также = и). Омонимичные сочетания знаменательных слов с частицами (<i>что бы, то же, так же</i>) пишутся раздельно; частицы можно безболезненно выкинуть.", ex: "Союз: Выучи правило, <i>чтобы</i> (для того чтобы) сдать тест. Сочетание: <i>Что бы</i> (что мне почитать бы?) мне почитать?" },
            { id: "51", title: "Морфологический разбор союза. Академический алгоритм", text: "Порядок лингвистического исследования союза: 1) Часть речи; 2) Сочинительный или подчинительный; 3) Разряд по значению (противительный, целевой и т.д.); 4) Простой или составной; 5) Характер синтаксической связи (что связывает).", ex: "Схема: 'Он опоздал, <i>потому что</i> шёл ливень'. Потому что — союз, подчинительный, причинный, составной, связывает части СПП." },
            { id: "52", title: "Культура речи. Синонимика и стилистическая замена союзов", text: "Исследуются возможности стилистической трансформации предложений. Замена союзов помогает варьировать логические акценты, избегать монотонности и переводить текст из разговорного регистра в официально-деловой или книжный.", ex: "Замена: Мы устали, <i>но</i> продолжили путь (простое противопоставление) -> <i>Хотя</i> мы устали, мы продолжили путь (уступительный оттенок)." }
        ];
        const container = document.getElementById('topics-root');
        chapterData.forEach(t => {
            container.innerHTML += `<div class="topic-card"><div class="topic-header"><div class="topic-name">Параграф ${t.id}. ${t.title}</div><button class="btn-toggle" onclick="toggleTopic(this)">Развернуть</button></div><div class="topic-details"><p>${t.text}</p><div class="example">${t.ex}</div></div></div>`;
        });
        function toggleTopic(button) {
            const d = button.closest('.topic-card').querySelector('.topic-details');
            if (d.style.display === 'block') { d.style.display = 'none'; button.innerText = 'Развернуть'; }
            else { d.style.display = 'block'; button.innerText = 'Свернуть'; }
        }
    </script>
</body>
</html>
